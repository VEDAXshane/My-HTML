<!DOCTYPE html>
<html>
    <head>
        <title>
            TAGS NILIZO JIFUNZA KWENYE HTML
        </title>
        <body>
            <!-- 
            tag ya kwanza ni HEAD
            hii ina kuwa na head kuanzia moja hadi sita  kama ifuatavyo
            -->
            <h1>
                HEAD1
            </h1>
            <h2>
                HEAD2
            </h2>
            <h3>
                HEAD3
            </h3>
            <h4>
                HEAD4
            </h4>
            <h5>
                HEAD5
            </h5>
            <h6>
                HEAD6
            </h6>
            <!-- 
            tag nyingine ni 
            paragraph
            hii hii ina kuwa na paragraph mbili tu
            mfano -->
            <p>
                PARAGRAPH1
            </p>
            <p>
                PARAGRAPH2
            </p>
            <!-- 
            tag nyingine ni italic 
            hii inatumika ku isset text in form of italic
            mfano -->
            <i>
                italic text
            </i>
            <!-- tag nyingine ni image
             hii inatumika ku isset image kwenye page yako 
             mfano -->
             <img>image ina kaa hapa</img>
             <!-- 
             tag nyingine ina ni link
             hii inatumika kuonyesha link e
              -->
             <a>
                this is my link
             </a>
             <!-- 
             tag nyingine ni unorded list na ordered list 
             kwa mfano -->
             <ul>
                <li>tag</li>
                <li>element</li>
                <li>attributes</li>
             </ul>
             <ol>
                <li>tag</li>
                <li>element</li>
                <li>attributes</li>.
                
             </ol>
             <!-- 
                tag nyingine ni boild
                hii inatumika ku bold text  -->
                <b>text  bolded</b>

        </body>
    </head>
</html>
